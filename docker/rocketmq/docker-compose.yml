services:
  # NameServer：路由注册中心
  rmqnamesrv:
    image: apache/rocketmq:5.5.0
    container_name: rmqnamesrv
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    networks:
      - rocketmq

  # Broker：消息存储与转发
  rmqbroker:
    image: apache/rocketmq:5.5.0
    container_name: rmqbroker
    ports:
      - "8080-8081:8080-8081"
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    environment:
      - NAMESRV_ADDR=rmqnamesrv:9876
    volumes:
      - ./broker.conf:/home/rocketmq/rocketmq-5.5.0/conf/broker.conf
    command: sh mqbroker -c /home/rocketmq/rocketmq-5.5.0/conf/broker.conf
    depends_on:
      - rmqnamesrv
    networks:
      - rocketmq

  # Dashboard：可视化控制台（可选），访问 http://localhost:8082
  rmqdashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: rmqdashboard
    ports:
      - "8082:8082"
    environment:
      - JAVA_OPTS=-Drocketmq.namesrv.addr=rmqnamesrv:9876 -Dserver.port=8082
    depends_on:
      - rmqnamesrv
    networks:
      - rocketmq

networks:
  rocketmq:
    driver: bridge
