dataSources:
  ds_0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://127.0.0.1:3306/shanlink?useUnicode=true&characterEncoding=UTF-8&rewriteBatchedStatements=true&allowMultiQueries=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    connectionTimeoutMilliseconds: 20000
    idleTimeoutMilliseconds: 300000
    maxPoolSize: 5
    minPoolSize: 5

rules:
  - !SHARDING
    tables:
      t_group:
        actualDataNodes: ds_0.t_group_${0..15}
        tableStrategy:
          standard:
            shardingColumn: username
            shardingAlgorithmName: group_table_hash_mod
    shardingAlgorithms:
      group_table_hash_mod:
        type: HASH_MOD
        props:
          sharding-count: 16

props:
  sql-show: true
